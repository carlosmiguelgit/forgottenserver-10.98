name: Build - VCPKG

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - v*
  pull_request:

jobs:
  build-vcpkg:
    name: windows-release-luajit-off
    runs-on: windows-latest

    env:
      VCPKG_BUILD_TYPE: release
      # Define onde o vcpkg vai guardar os binários compilados para o cache
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache

    steps:
      - uses: actions/checkout@v4

      - name: Get latest CMake
        uses: lukka/get-cmake@latest

      # --- NOVO: Configuração de Cache ---
      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          # O cache é invalidado se o vcpkg.json ou o vcpkg-configuration.json mudar
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Create vcpkg cache directory
        run: mkdir -p ${{ github.workspace }}/vcpkg_cache

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          # Garante que ele use o cache que configuramos acima
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Configure with CMake
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DUSE_LUAJIT=off
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact binary (exe)
        uses: actions/upload-artifact@v4
        with:
          name: tfs-windows-release-luajit-off-${{ github.sha }}
          path: |
            build/Release/tfs.exe
            build/Release/*.dll
