name: Build - VCPKG

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:

jobs:
  build-vcpkg:
    name: windows-release-luajit-off
    runs-on: windows-latest

    env:
      VCPKG_BUILD_TYPE: release
      # Define onde o vcpkg vai buscar/salvar os pacotes já compilados (.zip)
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg_cache

    steps:
      - uses: actions/checkout@v4

      - name: Get latest CMake
        uses: lukka/get-cmake@latest

      # 1. Recupera o cache do GitHub
      - name: Restore vcpkg binary cache
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg_cache
          # A chave muda apenas se o vcpkg.json mudar
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      # 2. Garante que a pasta do cache existe para evitar erros
      - name: Create vcpkg cache directory
        run: mkdir -p ${{ github.workspace }}/vcpkg_cache

      # 3. Executa o vcpkg (ele vai notar que a env VCPKG_DEFAULT_BINARY_CACHE existe)
      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      # 4. Configuração com o Toolchain correto
      - name: Configure with CMake
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DUSE_LUAJIT=off
          -DVCPKG_TARGET_TRIPLET=x64-windows-static
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact binary
        uses: actions/upload-artifact@v4
        with:
          name: tfs-windows-release-luajit-off-${{ github.sha }}
          path: |
            build/Release/tfs.exe
            build/Release/*.dll
