name: Build - VCPKG (Windows Release)

on:
  workflow_dispatch:
  push:
    branches: [master, v*]
  pull_request:

jobs:
  build-windows-release:
    runs-on: windows-latest
    name: windows-Release

    env:
      VCPKG_BUILD_TYPE: release

    steps:
      - uses: actions/checkout@v4

      - name: Get latest CMake
        uses: lukka/get-cmake@latest

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Configure & Build (Release)
        uses: lukka/run-cmake@v10
        with:
          configurePreset: vcpkg
          configurePresetAdditionalArgs: "['-DUSE_LUAJIT=on']"
          buildPreset: vcpkg
          buildPresetAdditionalArgs: "['--config', 'Release']"

      - name: Upload artifact (Windows Release)
        uses: actions/upload-artifact@v4
        with:
          name: tfs-windows-Release-${{ github.sha }}
          path: |
            ${{ runner.workspace }}/build/Release/tfs.exe
            ${{ runner.workspace }}/build/Release/*.dll
