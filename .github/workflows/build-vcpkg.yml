name: Build - VCPKG

on:
  workflow_dispatch:
    inputs:
      os:
        description: "Operating system"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ubuntu
          - macos
          - windows
      buildtype:
        description: "Build type"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - Debug
          - Release
      luajit:
        description: "Use LuaJIT"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - on
          - off

  push:
    branches:
      - master
      - v*
    paths:
      - .github/workflows/build-vcpkg.yml
      - cmake/**
      - src/**
      - CMakeLists.txt
      - CMakePresets.json
      - vcpkg.json

  pull_request:
    paths:
      - .github/workflows/build-vcpkg.yml
      - cmake/**
      - src/**
      - CMakeLists.txt
      - CMakePresets.json
      - vcpkg.json

jobs:
  build-vcpkg:
    name: ${{ matrix.os }}-${{ matrix.buildtype }}-luajit=${{ matrix.luajit }}
    runs-on: ${{ matrix.os }}-latest

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, macos, windows]
        buildtype: [Debug, Release]
        luajit: [on, off]

    env:
      VCPKG_BUILD_TYPE: release

    if: |
      (github.event_name != 'workflow_dispatch') ||
      (
        (github.event.inputs.os == 'all' || github.event.inputs.os == matrix.os) &&
        (github.event.inputs.buildtype == 'all' || github.event.inputs.buildtype == matrix.buildtype) &&
        (github.event.inputs.luajit == 'all' || github.event.inputs.luajit == matrix.luajit)
      )

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: +security-extended,security-and-quality
          config: |
            paths-ignore:
              - 'vcpkg/**'
        if: ${{ matrix.os == 'ubuntu' && matrix.buildtype == 'Debug' }}

      - name: Get latest CMake
        uses: lukka/get-cmake@latest

      - name: Run vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Configure & Build with CMake
        uses: lukka/run-cmake@v10
        with:
          configurePreset: vcpkg
          configurePresetAdditionalArgs: "['-DUSE_LUAJIT=${{ matrix.luajit }}']"
          buildPreset: vcpkg
          buildPresetAdditionalArgs: "['--config', '${{ matrix.buildtype }}']"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"
        if: ${{ matrix.os == 'ubuntu' && matrix.buildtype == 'Debug' }}

      - name: Upload artifact binary
        uses: actions/upload-artifact@v4
        if: ${{ !startsWith(matrix.os, 'windows') }}
        with:
          name: tfs-${{ matrix.os }}-${{ matrix.buildtype }}-luajit=${{ matrix.luajit }}-${{ github.sha }}
          path: ${{ runner.workspace }}/build/${{ matrix.buildtype }}/tfs

      - name: Upload artifact binary (Windows)
        uses: actions/upload-artifact@v4
        if: ${{ startsWith(matrix.os, 'windows') }}
        with:
          name: tfs-${{ matrix.os }}-${{ matrix.buildtype }}-luajit=${{ matrix.luajit }}-${{ github.sha }}
          path: |
            ${{ runner.workspace }}/build/${{ matrix.buildtype }}/tfs.exe
            ${{ runner.workspace }}/build/${{ matrix.buildtype }}/*.dll

      - name: Prepare datapack contents
        run: find . -maxdepth 1 ! -name data ! -name config.lua.dist ! -name key.pem ! -name LICENSE ! -name README.md ! -name schema.sql -exec rm -r {} \;
        shell: bash

      - name: Upload datapack contents
        uses: actions/upload-artifact@v4
        with:
          name: datapack-${{ matrix.os }}-${{ matrix.buildtype }}-luajit=${{ matrix.luajit }}-${{ github.sha }}
          path: ${{ github.workspace }}
